<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bolão Lotofácil</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6b21a8" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2639/2639642.png" />
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2639/2639642.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Forçar atualização e limpeza de Service Worker se houver tela branca
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          console.log('Detectada tela branca, tentando recuperar...');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for(let registration of registrations) {
                registration.unregister();
              }
            });
          }
          localStorage.clear();
          sessionStorage.clear();
          
          var div = document.createElement('div');
          div.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;font-family:sans-serif;z-index:9999;';
          div.innerHTML = '<h2 style="color:#6B21A8;margin-bottom:10px;">Atualização Necessária</h2>' +
            '<p style="color:#64748b;font-size:14px;margin-bottom:20px;">Limpamos o cache antigo para carregar a nova versão.</p>' +
            '<button onclick="window.location.reload();" style="background:#6B21A8;color:white;border:none;padding:12px 24px;border-radius:12px;font-weight:bold;cursor:pointer;">RECARREGAR AGORA</button>';
          document.body.appendChild(div);
        }
      }, 5000);

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registrado!', reg))
            .catch(err => console.log('Erro no SW:', err));
        });
      }
    </script>
  </body>
</html>
